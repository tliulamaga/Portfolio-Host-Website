<section class="py-4 text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Let’s Talk</h1>
        <p class="lead mt-3">
            Have a project in mind or want a free website audit?
            Fill out the form below and I’ll get back to you.
        </p>
    </div>
</section>

<section class="py-2">
    <div class="container" style="max-width: 700px;">
        
        <form action="https://formspree.io/f/xnjyyndl" method="POST">
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Your email" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Website (optional)</label>
        <input type="text" name="website" class="form-control" placeholder="https://yourwebsite.com">
    </div>

    <div class="mb-4">
        <label class="form-label">How can I help?</label>
        <textarea name="message" class="form-control" rows="4" placeholder="Tell me about your project..."></textarea>
    </div>

    <!-- Optional: custom subject -->
    <input type="hidden" name="_subject" value="New Website Inquiry">

    <div class="text-center">
        <button type="submit" class="btn btn-custom btn-lg">
            Send Message
        </button>
    </div>

</form>

    </div>
</section>

<section class="py-4 bg-light text-center">
    <div class="container">
        <p class="mb-1">Or email me directly:</p>
        <a href="mailto:your@email.com" class="fw-semibold text-dark">
            liulamagathomas@gmail.com
